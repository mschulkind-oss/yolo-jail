# yolo-jail kitty configuration snippet
#
# Add the following to your ~/.config/kitty/kitty.conf:
#
#   include ~/.config/kitty/yolo-jail.conf
#
# Requirements:
#   - kitty remote control must be enabled:
#       allow_remote_control yes
#       listen_on unix:/tmp/kitty
#   - A custom tab_bar.py that detects "🔒 JAIL" in the tab title and
#     renders the tab with a red background (see docs/tab_bar.py for an example).
#
# When yolo-jail runs inside a kitty tab it calls:
#   kitten @ set-tab-title "🔒 JAIL <project>"
# on entry and restores the original title on exit.

# Enable remote control so kitten @ commands work
allow_remote_control yes
listen_on unix:/tmp/kitty

# Custom tab bar renders jail tabs in red (requires tab_bar.py alongside this file)
tab_bar_style custom
tab_bar_min_tabs 1
