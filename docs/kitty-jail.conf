# yolo-jail kitty configuration snippet
#
# Add the following to your ~/.config/kitty/kitty.conf:
#
#   include ~/.config/kitty/yolo-jail.conf
#
# This is the ONLY thing needed on your side. yolo-jail uses kitty's
# remote control API (kitten @ set-tab-title / set-tab-color) to:
#   - Set the tab title to "🔒 JAIL <project>" on entry
#   - Turn the tab background red while the jail is active
#   - Restore both title and colors on exit
#
# No custom tab_bar.py is needed.

# Enable remote control so kitten @ commands work from inside the jail
allow_remote_control yes
