# goreleaser config — ★ step 2 of the Go transition (docs/implementation/
# go-port-remaining-work.md). Shape copied from mschulkind-oss/swarf, adapted:
# like swarf, yolo-jail ships ONE host-facing binary: yolo (host CLI, which
# also hosts the daemons via the hidden `yolo internal daemon <name>`
# subcommands). The standalone host-daemon binaries were retired — their logic
# lives in internal/* Main funcs reached through `yolo internal daemon <name>`.
# yolo-ps is the in-jail client for the host-processes loophole; it ships only
# inside the NIX IMAGE (inert on the host — no service socket) and so is NOT
# distributed through the host channels. The in-jail daemons (yolo-entrypoint,
# yolo-jaild) also ship inside the NIX IMAGE and must NOT be listed here;
# goprobe is dev-only.
#
# Releasing = pushing a v* tag (.github/workflows/release.yml). No local
# `just release` recipe by design.
#
# Version stamping: internal/version resolves a baked stamp before live
# `git describe` (divergence D18), so these ldflags are what a released binary
# reports. buildVersion is intentionally unexported — -X reaches it fine.
version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...
    # Stage the PREBUILT "two files and a binary" bundle that ships beside the
    # host binary so a checkout-less install can build the jail image
    # (nix build .#ociImage) with NO Go toolchain and NO source tree — the
    # flake's prebuilt short-circuit consumes bin/linux-<arch> instead of
    # compiling. See scripts/stage-source-bundle.sh + internal/reporoot
    # (BundledSourceDir). This cross-compiles both Linux arches, so it needs the
    # Go toolchain the setup-go step already provides.
    # MUST stage OUTSIDE dist/: GoReleaser's dist.Pipe wipes dist/ right after
    # the before-hooks, so a bundle under dist/ would be deleted before archiving.
    - scripts/stage-source-bundle.sh bundle/share/yolo-jail

builds:
  - id: yolo
    main: ./cmd/yolo
    binary: yolo
    ldflags: &ldflags
      - -s -w
      - -X github.com/mschulkind-oss/yolo-jail/internal/version.buildVersion={{.Version}}
      - -X github.com/mschulkind-oss/yolo-jail/internal/version.GitCommit={{.ShortCommit}}
    env: &buildenv
      - CGO_ENABLED=0
    goos: &oses
      - linux
      - darwin
    goarch: &arches
      - amd64
      - arm64

# One archive per platform containing the yolo binary AND the prebuilt bundle
# (share/yolo-jail/) an installed binary needs to build the jail image. The
# archive lays out `yolo` + `share/yolo-jail/…` at the same level, so once
# unpacked, BundledSourceDir finds the bundle at <exe>/share/yolo-jail (its
# second candidate — see internal/reporoot). The bundle is arch-agnostic (it
# carries bin/linux-{amd64,arm64}), so the SAME staged tree ships in every
# platform archive; the flake selects the matching arch at eval time.
archives:
  - formats: ["tar.gz"]
    name_template: "yolo-jail_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      # Copy the staged bundle DIRECTORY, preserving its subtree
      # (flake.nix, flake.lock, bin/linux-<arch>/). With a directory `src`,
      # goreleaser places the contents under `dst` keeping the tree — so files
      # land at share/yolo-jail/… beside the root binary. NO glob + strip_parent
      # (that flattens the tree and breaks the flake's prebuilt-bin layout).
      # NOTE: goreleaser is not installed in the dev jail, so this mapping is
      # validated on a real release, not here — the Homebrew bottle path
      # (release.yml) is the primary bundle delivery.
      - src: "bundle/share/yolo-jail"
        dst: "share/yolo-jail"

checksum:
  name_template: "checksums.txt"

# Exclude patterns cover both the scoped (docs(scope):) and unscoped (docs:)
# conventional-commit forms this repo uses.
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs[:(]"
      - "^chore[:(]"
      - "^test[:(]"
