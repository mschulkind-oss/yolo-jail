# yolo-jail "audio" loophole — ALSA → PipeWire routing.
#
# Bind-mounted into the jail at /etc/asound.conf.  Tells libasound that
# the "default" PCM/CTL device is the PipeWire shim instead of the
# hardware fallback `hw:0,0`.  Without this, anything that dlopens
# libasound (Claude Code's voice mode is the canonical example) hits
# `snd_pcm_open("default")` → ALSA tries to enumerate `/dev/snd/card0`
# → no such device in the jail → `cannot find card '0'`.
#
# The pipewire ALSA plugin (libasound_module_pcm_pipewire.so) ships
# with the nixpkgs `pipewire` package and gets linked into the jail
# profile at /lib/alsa-lib/.  We reference it explicitly because
# alsa-lib's built-in plugin search path is its own nix store libdir,
# not the merged /lib/alsa-lib/ that picks up the pipewire shim.

pcm_type.pipewire {
    lib "/lib/alsa-lib/libasound_module_pcm_pipewire.so"
}

ctl_type.pipewire {
    lib "/lib/alsa-lib/libasound_module_ctl_pipewire.so"
}

pcm.!default {
    type pipewire
}

ctl.!default {
    type pipewire
}
