name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Unit tests
        run: uv run pytest tests/ -v -m "not slow"

  check-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Unit tests (macOS)
        run: uv run pytest tests/ -v -m "not slow"

  integration:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install Podman and socat
        run: sudo apt-get update && sudo apt-get install -y podman socat

      - name: Build and load jail image
        run: |
          nix build --impure .#dockerImage
          ./result | podman load

      - name: Integration tests
        run: uv run pytest tests/test_jail.py -v
        env:
          YOLO_RUNTIME: podman

  integration-macos:
    # macOS Intel runners support nested virtualization, so Docker via Colima works.
    # This lets us run macOS integration tests for free on public repos.
    # Note: x86_64 not ARM — tests the macOS code paths, not native ARM performance.
    runs-on: macos-15-intel
    needs: check-macos
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Install Docker via Colima
        run: |
          brew install --quiet colima docker socat
          colima start --cpu 2 --memory 4 --disk 30 --mount-type sshfs

      - name: Build and load jail image
        run: |
          # The jail image targets Linux.  Build inside a Linux container to
          # avoid needing a Nix Linux builder on the macOS host.
          docker run --rm \
            -v "$PWD:/src:ro" \
            -w /src \
            nixos/nix:2.34.4 \
            sh -c 'nix --extra-experimental-features "nix-command flakes" build --impure .#dockerImage --out-link /tmp/result && /tmp/result' \
            | docker load

      - name: Integration tests (macOS + Docker)
        run: uv run pytest tests/test_jail.py tests/test_runtime.py -v -k "not podman"
        env:
          YOLO_RUNTIME: docker
