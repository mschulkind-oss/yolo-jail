name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Opt every JavaScript action into Node.js 24 ahead of GitHub's
# 2026-06-02 default switch.  ``actions/upload-artifact@v5`` still
# bundles Node 20 in its ``action.yml`` (no v6 with Node 24 yet);
# this env var overrides that for the whole workflow without
# pinning to a beta tag, and silences the runtime deprecation
# annotation we'd otherwise get on every CI run.  Removable once
# every pinned action ships a Node-24 release.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # The Go tree gets its own job: `go vet` + the short test suite, which
  # includes guards nothing else enforces automatically (TestEmbedMatchesTree —
  # the go:embed/tree sync for bundled loopholes; the version stamp contract;
  # the config/argv regression suites).
  check-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -short ./...

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Unit tests
        # -n 4 matches GH hosted runners' 4 vCPUs; worksteal shaves the
        # long-test tail.  The integration job below stays serial (real
        # containers; session image load must not run per worker).
        run: uv run pytest tests/ -v -m "not slow" -n 4 --dist worksteal

  check-macos:
    runs-on: macos-latest
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Unit tests (macOS)
        run: uv run pytest tests/ -v -m "not slow" -n 4 --dist worksteal

  build-image:
    # Build the jail image on BOTH arches natively — x86_64 and arm64 — so
    # linux/arm (aarch64-linux) is a tested target, not just an aspirational
    # claim.  ubuntu-24.04-arm is a free, unlimited hosted runner on this
    # public repo.  Native per-arch build (no QEMU/--platform): nix
    # substitutes the whole closure from cache.nixos.org for aarch64-linux
    # and compiles only the few repo-local derivations.  The Free-disk-space
    # `rm -rf … || true` below no-ops harmlessly on the arm image's absent
    # x86 toolchains.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    needs: check
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # GitHub-hosted runners start with ~14 GB free on /.  A full nix build
      # of yolo-jail (chromium + gcc + podman + nix) needed ~8 GB of store
      # plus the 4.3 GB streamed image tar on top of that, and ran OOD on
      # the last run.  Strip the ~25 GB of preinstalled toolchains we never
      # touch and prune the runner's preinstalled docker image cache before
      # building (the runner's docker daemon is unrelated to yolo-jail).
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          sudo apt-get clean
          df -h /

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build minimal jail image
        # The minimal variant drops chromium, the gcc toolchain, nested-podman,
        # and assorted dev/debug tools — roughly 1.6–2 GB off the streamed tar.
        # It still contains everything tests/test_jail.py exercises.  The full
        # image builds locally via `just build-image` and runs in production.
        run: |
          nix build --impure .#ociImageMinimal
          ./result > /tmp/jail-image.tar
          ls -lh /tmp/jail-image.tar

      - name: Upload jail image
        uses: actions/upload-artifact@v7
        with:
          name: jail-image-${{ matrix.os }}
          path: /tmp/jail-image.tar
          retention-days: 1

  integration:
    # Run the end-to-end podman suite on both arches — this is where arch
    # actually matters (dynamic-linker resolution, ldconfig, agent installs).
    # A red arm cell in the agent-install matrix means an agent CLI lacks a
    # linux-arm64 upstream build; gate that agent out of the arm matrix rather
    # than patching the test.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    needs: build-image
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Same disk pressure considerations as build-image.  Loading the image
      # into podman's rootless store doubles its on-disk footprint, and the
      # integration test suite pulls additional nix closures on top.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          sudo apt-get clean
          df -h /

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install Podman and socat
        run: sudo apt-get update && sudo apt-get install -y podman socat

      - name: Download jail image
        uses: actions/download-artifact@v8
        with:
          name: jail-image-${{ matrix.os }}
          path: /tmp

      - name: Load jail image
        run: podman load < /tmp/jail-image.tar

      - name: Integration tests
        run: uv run pytest tests/test_jail.py -v
        env:
          YOLO_RUNTIME: podman


