# Publish — PyPI wheels + image-cache/builder pushes for a release.
# ★ step 2 of the Go transition: the PyPI package is now per-platform wheels
# wrapping the Go host binaries (built by tools/build-wheels), preserving the
# pipx/uvx audience and the one console script (yolo). The
# homebrew tap update moved to release.yml (source-build formula, no poet).
# Image-cache + builder-image pushes are unchanged.
#
# ⚠ Trigger: the v* TAG PUSH is the load-bearing trigger, NOT the GitHub
# release. goreleaser (release.yml) creates the release with the
# workflow-scoped GITHUB_TOKEN, and GitHub's recursion guard means
# bot-token-created events NEVER trigger `on: release` workflows — a
# release-only trigger would silently never fire on the documented
# "releasing = push a v* tag" flow. The release trigger is kept as well so a
# HUMAN-published release (UI/gh — e.g. re-publishing after a failure) also
# works; `uv publish --check-url` and the image pushes are idempotent, and the
# concurrency group collapses double-fires.
#
# PyPI auth is Trusted Publishing (OIDC): pinned to THIS workflow filename +
# the `pypi` environment — renaming either breaks the publisher config.
name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  packages: write  # push the container builder image to GHCR

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build wheels (Go binaries, all platforms)
        run: |
          version="${GITHUB_REF_NAME#v}"
          go run ./tools/build-wheels --version "$version" --output-dir dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        run: uv publish dist/* --check-url https://pypi.org/simple/

  # Build both OCI image variants on Linux and push them to the Cachix cache
  # so macOS users download the prebuilt image instead of needing a Linux
  # builder.  Release-gated only.
  #
  # NO-OP UNTIL SET UP (see docs/plans/handoff-cachix-cache.md): the job skips
  # entirely unless the CACHIX_AUTH_TOKEN secret is configured — so releases
  # stay green before the Cachix account exists. The cache NAME is not a secret
  # and defaults to `yolo-jail` (the CACHIX_CACHE variable only overrides it,
  # e.g. for a fork pushing to its own cache).
  push-image-cache:
    # Push BOTH x86_64-linux and aarch64-linux closures — each matrix cell
    # builds + pushes its own native arch.  The aarch64-linux closure is the
    # SAME one Apple Silicon Macs consume, so this also serves the mac/arm
    # audience (previously the x86-only push left them building from source).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check Cachix is configured
        id: gate
        run: |
          # Gate on the auth token alone — the cache NAME is not a secret and
          # defaults to `yolo-jail`. Publish the resolved name for later steps.
          if [ -n "${{ secrets.CACHIX_AUTH_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "cache=${{ vars.CACHIX_CACHE || 'yolo-jail' }}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cachix not configured (no CACHIX_AUTH_TOKEN secret). Skipping — see docs/plans/handoff-cachix-cache.md."
          fi

      - uses: actions/checkout@v7
        if: steps.gate.outputs.enabled == 'true'
        with:
          fetch-depth: 0

      # Same disk pressure as the build-image job in ci.yml.
      - name: Free disk space
        if: steps.gate.outputs.enabled == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          sudo apt-get clean

      - name: Install Nix
        if: steps.gate.outputs.enabled == 'true'
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up Cachix
        if: steps.gate.outputs.enabled == 'true'
        uses: cachix/cachix-action@v15
        with:
          name: ${{ steps.gate.outputs.cache }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # cachix-action auto-pushes every path built while it's active, so a
      # plain `nix build` of both variants populates the cache.
      - name: Build + push both image variants
        if: steps.gate.outputs.enabled == 'true'
        run: |
          nix build --impure .#ociImage
          nix build --impure .#ociImageMinimal
          echo "Pushed image closures to ${{ steps.gate.outputs.cache }}.cachix.org"

  # Build the macOS container-Linux-builder image and push it to GHCR, so
  # macOS users (Apple Container / Podman) `pull` a ready nix+sshd builder
  # instead of building an aarch64-linux image on a Mac (chicken-and-egg: a
  # Mac needs a Linux builder to build the builder).  Built natively on the
  # arm-Linux runner — Apple Silicon consumes the SAME aarch64-linux image.
  # See docs/research/macos-container-builder-exploration.md + the AC runbook.
  push-builder-image:
    runs-on: ubuntu-24.04-arm  # native aarch64-linux for Apple Silicon Macs
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin

      # The flake output is a *streamer* that writes a docker-archive tar to
      # stdout (KEYLESS — the ssh key is injected at container-run time).
      # skopeo copies that tar straight to GHCR, tagged by release version +
      # `latest`.  aarch64-linux only: it's the arch Apple Silicon runs; an
      # x86_64 mac (rare, and Podman-only) can build locally or use QEMU.
      - name: Build + push builder image to GHCR
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/yolo-jail-builder"
          STREAMER=$(nix build --impure --no-link --print-out-paths \
            .#packages.aarch64-linux.builderImage)
          "$STREAMER" > /tmp/builder.tar
          skopeo copy "docker-archive:/tmp/builder.tar" \
            "docker://${REPO}:${VERSION}"
          skopeo copy "docker-archive:/tmp/builder.tar" \
            "docker://${REPO}:latest"
          echo "Pushed ${REPO}:${VERSION} and :latest"
          # Visibility is a persistent, per-PACKAGE property — set ONCE (already
          # done for yolo-jail-builder) and inherited by every future tag push.
          # No per-release flip needed.  If the package is ever renamed, the new
          # name is created PRIVATE by the first push; flip it to Public once in
          # GHCR → Packages → yolo-jail-builder → Settings → Change visibility.
          # (No auto-PATCH here: the default GITHUB_TOKEN can't admin a
          # just-created org package, so it always 404'd — the step was a no-op
          # after the one-time manual flip and dead weight on every release.)
