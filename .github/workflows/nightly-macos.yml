name: Nightly macOS Integration

on:
  schedule:
    # Run at 06:00 UTC daily (1am EST / 10pm PST)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

# Opt every JavaScript action into Node.js 24 ahead of GitHub's
# 2026-06-02 default switch.  See ci.yml for full rationale.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build jail image
        run: |
          nix build --impure .#ociImage
          ./result > /tmp/jail-image.tar

      - name: Upload jail image
        uses: actions/upload-artifact@v7
        with:
          name: jail-image
          path: /tmp/jail-image.tar
          retention-days: 1

  integration-macos:
    # macOS Intel runners support nested virtualization via Podman Machine.
    # Note: x86_64 not ARM — tests the macOS code paths, not native ARM performance.
    runs-on: macos-13
    needs: build-image
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Install Podman
        run: |
          brew install --quiet podman
          podman machine init --cpus 2 --memory 4096 --disk-size 30
          podman machine start

      - name: Download jail image
        uses: actions/download-artifact@v8
        with:
          name: jail-image
          path: /tmp

      - name: Load jail image
        run: |
          podman load < /tmp/jail-image.tar
          podman tag yolo-jail:latest localhost/yolo-jail:latest

      - name: Integration tests (macOS + Podman)
        run: uv run pytest tests/test_jail.py tests/test_runtime.py -v
        env:
          YOLO_RUNTIME: podman
