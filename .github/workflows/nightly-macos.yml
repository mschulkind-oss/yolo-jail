name: Nightly macOS Integration

on:
  schedule:
    # Run at 06:00 UTC daily (1am EST / 10pm PST)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

# Opt every JavaScript action into Node.js 24 ahead of GitHub's
# 2026-06-02 default switch.  See ci.yml for full rationale.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build jail image
        run: |
          nix build --impure .#ociImage
          ./result > /tmp/jail-image.tar

      - name: Upload jail image
        uses: actions/upload-artifact@v7
        with:
          name: jail-image
          path: /tmp/jail-image.tar
          retention-days: 1

  integration-macos:
    # macOS Intel runners support nested virtualization via Podman Machine;
    # GitHub's Apple Silicon runners do not, so stay on an -intel label.
    # macos-13 was retired Dec 2025. macOS 26 (Tahoe) is the last Intel macOS,
    # and GitHub plans to retire Intel runner images around late 2027 — after
    # that this job needs a self-hosted runner or arm64 nested-virt support.
    # Note: x86_64 not ARM — tests the macOS code paths, not native ARM performance.
    runs-on: macos-26-intel
    needs: build-image
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # The CLI expects nix on the macOS host (yolo check gates on it, and
      # per-workspace images with extra packages are nix-built locally,
      # substituting from the NixOS binary cache — see docs/macos.md).
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Install Podman
        run: |
          # No brew here: Homebrew ships no x86_64 macOS bottles for podman
          # 6.x (Tier 3 on Tahoe Intel → "no bottle available"), and podman
          # v6 dropped Intel macOS builds upstream. v5.8.x is the last line
          # with podman-installer-macos-amd64.pkg, so pin its latest.
          curl -fsSL -o /tmp/podman.pkg \
            "https://github.com/containers/podman/releases/download/v5.8.4/podman-installer-macos-amd64.pkg"
          sudo installer -pkg /tmp/podman.pkg -target /
          echo "/opt/podman/bin" >> "$GITHUB_PATH"
          export PATH="/opt/podman/bin:$PATH"
          podman machine init --cpus 2 --memory 4096 --disk-size 30
          podman machine start

      - name: Download jail image
        uses: actions/download-artifact@v8
        with:
          name: jail-image
          path: /tmp

      - name: Load jail image
        run: |
          podman load < /tmp/jail-image.tar
          podman tag yolo-jail:latest localhost/yolo-jail:latest

      - name: Integration tests (macOS + Podman)
        run: uv run pytest tests/test_jail.py tests/test_runtime.py -v
        env:
          YOLO_RUNTIME: podman
